name: Pterodactyl Rust Yolks

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - docker/pterodactyl/rust/**
      - .github/workflows/pterodactyl-rust-yolks.yml

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/rustalink-pterodactyl-rust

jobs:
  build-and-push:
    name: Build & Push (${{ matrix.version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - version: "1.93"
            dockerfile: docker/pterodactyl/rust/1.93/Dockerfile
            tag: "1.93"

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ matrix.tag }}
            type=raw,value=latest

      - name: Build & Push image
        uses: docker/build-push-action@v6
        with:
          context: docker/pterodactyl/rust
          file: ${{ matrix.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=ptero-rust-${{ matrix.tag }}
          cache-to: type=gha,mode=max,scope=ptero-rust-${{ matrix.tag }}
